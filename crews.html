<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>런앤트레일 — 러닝크루</title>
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<link rel="stylesheet" href="assets/site.css">
<style>
  .crew-card { cursor: default; }
  .crew-card .schedule { font-size: 13px; color: #666; margin-top: 3px; }
  .crew-card .note { font-size: 13.5px; color: #555; margin-top: 8px; }
  .crew-icon { font-size: 22px; min-width: 54px; text-align: center; }
</style>
</head>
<body>
<nav class="topnav">
  <div class="inner">
    <span class="brand" id="brand"><img src="assets/logo.svg" alt="런앤트레일 로고">런앤트레일</span>
    <a href="index.html">대회 일정</a>
    <a href="shoes.html">러닝화</a>
    <a href="crews.html" class="active">러닝크루</a>
  </div>
</nav>
<div class="wrap">
  <header>
    <h1>👥 러닝크루</h1>
    <p id="subtitle">불러오는 중...</p>
  </header>

  <input class="search" id="search" type="search" placeholder="크루명·지역 검색">
  <div class="chips" id="region-chips"><span class="label">지역</span></div>

  <div id="list-view"></div>
  <footer>모임 일정은 크루 공지(인스타그램 등)에서 최종 확인하세요.</footer>
</div>

<script>
const REGIONS = ["서울","인천","경기","강원","대전","세종","충남","충북","광주","전남","전북","대구","경북","경남","부산","울산","제주"];
let items = [], regionFilter = "all", query = "";
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function render() {
  const q = query.toLowerCase();
  const shown = items.filter(it =>
    (regionFilter === "all" || it.region === regionFilter) &&
    (!q || (it.name + it.region + (it.schedule || "") + (it.note || "")).toLowerCase().includes(q))
  );
  document.getElementById("subtitle").textContent = `등록된 크루 ${shown.length}개`;
  const list = document.getElementById("list-view");
  if (!shown.length) { list.innerHTML = '<div class="empty">조건에 맞는 크루가 없어요</div>'; return; }
  list.innerHTML = shown.map(it => `
    <div class="card crew-card">
      <div class="crew-icon">👥</div>
      <div class="info">
        <div class="name">${it.instagram ? `<a href="${esc(it.instagram)}" target="_blank" rel="noopener">${esc(it.name)} ↗</a>` : esc(it.name)}</div>
        <div class="schedule">${it.region ? `<span class="region-tag">${esc(it.region)}</span> · ` : ""}${esc(it.schedule || "")}</div>
        ${it.note ? `<div class="note">${esc(it.note)}</div>` : ""}
      </div>
    </div>`).join("");
}

const box = document.getElementById("region-chips");
box.insertAdjacentHTML("beforeend",
  [{k:"all",l:"전체"}, ...REGIONS.map(r => ({k:r,l:r}))].map((f, i) =>
    `<button class="chip ${i===0?"on":""}" data-key="${f.k}">${f.l}</button>`).join(""));
box.addEventListener("click", e => {
  const btn = e.target.closest(".chip"); if (!btn) return;
  box.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c === btn));
  regionFilter = btn.dataset.key; render();
});
document.getElementById("search").addEventListener("input", e => { query = e.target.value.trim(); render(); });

fetch("data/crews.json")
  .then(r => r.json())
  .then(d => { items = d.items; render(); })
  .catch(() => { document.getElementById("subtitle").textContent = "데이터를 불러오지 못했어요 (data/crews.json 확인)"; });
</script>
</body>
</html>
