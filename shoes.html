<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="2026 인기 러닝화 총정리! 나이키·아식스·아디다스·호카 등 브랜드별, 데일리·템포·레이스·트레일 용도별 러닝화 추천과 무게·드롭 스펙 비교.">

<meta property="og:type" content="website">

<meta property="og:title" content="러닝화 추천 - 2026 인기 러닝화 총정리 | 런앤트레일">
<meta property="og:description" content="브랜드별·용도별 러닝화 추천과 무게·드롭 스펙 비교.">
<meta property="og:url" content="https://www.runandtrail.kr/shoes.html">
<meta property="og:image" content="https://www.runandtrail.kr/assets/og-image.png">
<meta name="twitter:card" content="summary_large_image">

<link rel="stylesheet" href="assets/site.css">
<style>
  .quiz {
    background: linear-gradient(135deg, #2e7d4f, #3fa06a); color: #fff;
    border-radius: 16px; padding: 18px 16px; margin-bottom: 14px;
  }
  .quiz h2 { font-size: 17px; margin-bottom: 12px; }
  .quiz .q { margin-bottom: 10px; }
  .quiz .q-label { font-size: 12.5px; opacity: .85; display: block; margin-bottom: 6px; font-weight: 700; }
  .quiz .q-opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .quiz .q-opts button {
    border: 1px solid rgba(255,255,255,.4); background: rgba(255,255,255,.12);
    color: #fff; border-radius: 999px; padding: 7px 13px; font-size: 13.5px; cursor: pointer;
  }
  .quiz .q-opts button.sel { background: #fff; color: #2e7d4f; font-weight: 800; border-color: #fff; }
  .quiz #quiz-go {
    margin-top: 6px; width: 100%; border: none; border-radius: 12px; padding: 12px;
    background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 800; cursor: pointer;
    opacity: .45;
  }
  .quiz #quiz-go.ready { opacity: 1; }
  .reco-title { font-size: 17px; font-weight: 800; margin: 18px 0 10px; }
  .reco-card { border: 2px solid #2e7d4f; position: relative; }
  .reco-rank {
    position: absolute; top: -10px; left: 12px; background: #2e7d4f; color: #fff;
    font-size: 12px; font-weight: 800; padding: 2px 10px; border-radius: 999px;
  }
  .reco-why { font-size: 13px; color: #2e7d4f; font-weight: 600; margin-top: 8px; }
  .reco-reset { font-size: 13px; color: #888; text-decoration: underline; cursor: pointer; margin: 4px 0 16px; display: inline-block; }
  .shoe-card { cursor: default; }
  .shoe-card .spec { font-size: 13px; color: #666; margin-top: 3px; }
  .shoe-card .note { font-size: 13.5px; color: #555; margin-top: 8px; }
  .cat-icon {
    min-width: 54px; height: 54px; border-radius: 12px; background: #f1f3f5;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
    overflow: hidden;
  }
  .cat-icon img { width: 100%; height: 100%; object-fit: cover; }
  .brand-tag { font-size: 12px; font-weight: 700; color: #2e7d4f; }
</style>
</head>
<body>
<nav class="topnav">
  <div class="inner">
    <span class="brand" id="brand"><img src="assets/logo.svg" alt="런앤트레일 로고">런앤트레일</span>
    <a href="index.html">대회 일정</a>
    <a href="small.html">소규모대회</a>
    <a href="shoes.html" class="active">러닝화</a>
    <a href="photos.html">대회사진</a>
  </div>
</nav>
<div class="wrap">
  <header>
    <h1>👟 러닝화 추천</h1>
    <p id="subtitle">불러오는 중...</p>
  </header>

  <div class="quiz" id="quiz">
    <h2>🎯 나에게 맞는 러닝화 찾기</h2>
    <div class="q"><span class="q-label">Q1. 러닝 경력은?</span>
      <div class="q-opts" data-q="level">
        <button data-v="beginner">이제 시작했어요</button>
        <button data-v="mid">달린 지 좀 됐어요</button>
        <button data-v="adv">기록을 노리는 중</button>
      </div>
    </div>
    <div class="q"><span class="q-label">Q2. 어디에 신을 건가요?</span>
      <div class="q-opts" data-q="use">
        <button data-v="jog">가벼운 조깅·건강</button>
        <button data-v="long">장거리 연습 (하프·풀)</button>
        <button data-v="speed">스피드 훈련</button>
        <button data-v="race">대회에서 기록</button>
        <button data-v="trail">산길·트레일</button>
      </div>
    </div>
    <div class="q"><span class="q-label">Q3. 가장 중요한 것은?</span>
      <div class="q-opts" data-q="prio">
        <button data-v="soft">푹신한 편안함</button>
        <button data-v="light">가벼움·경쾌함</button>
        <button data-v="protect">무릎·발목 보호</button>
        <button data-v="value">가성비</button>
      </div>
    </div>
    <button id="quiz-go">추천 받기</button>
  </div>
  <div id="quiz-result"></div>

  <input class="search" id="search" type="search" placeholder="모델명·브랜드 검색 (예: 카본, 입문)">
  <div class="chips" id="brand-chips"><span class="label">브랜드</span></div>
  <div class="chips" id="cat-chips"><span class="label">용도</span></div>

  <div id="list-view"></div>
  <footer>무게(남성 270mm 기준)·드롭은 근사치입니다. 구매 전 공식 스펙과 가격을 확인하세요.</footer>
</div>

<script>
const BRANDS = ["나이키","아식스","아디다스","호카","뉴발란스","사우코니","온","푸마","미즈노","브룩스"];
const CATEGORIES = ["데일리","맥스쿠션","템포","레이스","트레일","안정화"];
const CAT_ICON = { "데일리": "👟", "맥스쿠션": "☁️", "템포": "⚡", "레이스": "🏅", "트레일": "⛰️", "안정화": "🛡️" };
let items = [], brandFilter = "all", catFilter = "all", query = "";
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function render() {
  const q = query.toLowerCase();
  const shown = items.filter(it =>
    (brandFilter === "all" || it.brand === brandFilter) &&
    (catFilter === "all" || it.category === catFilter) &&
    (!q || (it.name + it.brand + it.category + (it.note || "")).toLowerCase().includes(q))
  );
  document.getElementById("subtitle").textContent = `등록된 러닝화 ${shown.length}켤레`;
  const list = document.getElementById("list-view");
  if (!shown.length) { list.innerHTML = '<div class="empty">조건에 맞는 러닝화가 없어요</div>'; return; }
  list.innerHTML = shown.map(it => `
    <div class="card shoe-card">
      <div class="cat-icon">${it.img ? `<img src="${esc(it.img)}" alt="" loading="lazy">` : (CAT_ICON[it.category] || "👟")}</div>
      <div class="info">
        <div class="name">${it.link ? `<a href="${esc(it.link)}" target="_blank" rel="noopener">${esc(it.name)} ↗</a>` : esc(it.name)}</div>
        <div class="spec"><span class="brand-tag">${esc(it.brand)}</span>${it.weight ? ` · ${esc(it.weight)}` : ""}${it.drop ? ` · 드롭 ${esc(it.drop)}` : ""}</div>
        <div class="tags"><span class="tag">${esc(it.category)}</span></div>
        ${it.note ? `<div class="note">${esc(it.note)}</div>` : ""}
      </div>
    </div>`).join("");
}

function setupChips(containerId, list, onChange) {
  const box = document.getElementById(containerId);
  box.insertAdjacentHTML("beforeend",
    [{k:"all",l:"전체"}, ...list.map(x => ({k:x,l:x}))].map((f, i) =>
      `<button class="chip ${i===0?"on":""}" data-key="${esc(f.k)}">${esc(f.l)}</button>`).join(""));
  box.addEventListener("click", e => {
    const btn = e.target.closest(".chip"); if (!btn) return;
    box.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c === btn));
    onChange(btn.dataset.key); render();
  });
}
setupChips("brand-chips", BRANDS, k => brandFilter = k);
setupChips("cat-chips", CATEGORIES, k => catFilter = k);
document.getElementById("search").addEventListener("input", e => { query = e.target.value.trim(); render(); });

// ── 러닝화 추천 마법사 ──
const answers = { level: null, use: null, prio: null };

document.querySelectorAll(".quiz .q-opts").forEach(box => {
  box.addEventListener("click", e => {
    const btn = e.target.closest("button"); if (!btn) return;
    box.querySelectorAll("button").forEach(b => b.classList.toggle("sel", b === btn));
    answers[box.dataset.q] = btn.dataset.v;
    document.getElementById("quiz-go").classList.toggle("ready",
      answers.level && answers.use && answers.prio);
  });
});

function recommend(a) {
  return items.map(it => {
    let s = 0;
    const why = [];
    const t = it.tags || [];
    const w = parseInt((it.weight || "").replace(/[^0-9]/g, "")) || 999;
    // Q2: 용도
    if (a.use === "jog") {
      if (it.category === "데일리") { s += 3; why.push("부담 없는 데일리화"); }
      if (it.category === "맥스쿠션") { s += 2; why.push("편안한 쿠션"); }
    } else if (a.use === "long") {
      if (it.category === "맥스쿠션") { s += 3; why.push("장거리용 두툼한 쿠션"); }
      if (t.includes("장거리")) { s += 2; why.push("장거리 훈련 인기 모델"); }
      if (it.category === "데일리") s += 1;
    } else if (a.use === "speed") {
      if (it.category === "템포") { s += 4; why.push("스피드 훈련용 템포화"); }
      if (t.includes("만능")) s += 1;
    } else if (a.use === "race") {
      if (it.category === "레이스") { s += 4; why.push("대회 기록용 레이싱화"); }
      if (it.category === "템포") { s += 2; why.push("대회·훈련 겸용 가능"); }
    } else if (a.use === "trail") {
      if (it.category === "트레일") { s += 5; why.push("트레일 전용"); }
      else s -= 5;
    }
    // Q3: 우선순위
    if (a.prio === "soft") {
      if (it.category === "맥스쿠션") s += 2;
      if (t.includes("회복")) { s += 1; why.push("푹신한 착화감"); }
    } else if (a.prio === "light") {
      if (w <= 235) { s += 2; why.push(`가벼운 무게(${it.weight})`); }
      else if (w <= 255) s += 1;
    } else if (a.prio === "protect") {
      if (it.category === "안정화") { s += 3; why.push("지지력 좋은 안정화"); }
      if (t.includes("보호")) { s += 2; why.push("보호 성향"); }
    } else if (a.prio === "value") {
      if (t.includes("가성비")) { s += 3; why.push("가성비 좋다는 평"); }
    }
    // Q1: 경력
    if (a.level === "beginner") {
      if (t.includes("입문")) { s += 2; why.push("입문자에게 무난"); }
      if (it.category === "레이스") s -= 4;
    } else if (a.level === "adv") {
      if (t.includes("기록")) s += 1;
    }
    return { it, s, why: [...new Set(why)] };
  }).sort((x, y) => y.s - x.s).slice(0, 3).filter(x => x.s > 0);
}

document.getElementById("quiz-go").addEventListener("click", () => {
  if (!(answers.level && answers.use && answers.prio)) return;
  const top = recommend(answers);
  const box = document.getElementById("quiz-result");
  if (!top.length) { box.innerHTML = '<div class="empty">조건에 맞는 추천이 없어요</div>'; return; }
  box.innerHTML = '<div class="reco-title">🏆 회원님께 추천하는 러닝화 TOP ' + top.length + "</div>" +
    top.map((r, i) => `
      <div class="card shoe-card reco-card">
        <span class="reco-rank">${i + 1}위</span>
        <div class="cat-icon">${r.it.img ? `<img src="${esc(r.it.img)}" alt="" loading="lazy">` : (CAT_ICON[r.it.category] || "👟")}</div>
        <div class="info">
          <div class="name">${esc(r.it.name)}</div>
          <div class="spec"><span class="brand-tag">${esc(r.it.brand)}</span>${r.it.weight ? ` · ${esc(r.it.weight)}` : ""}${r.it.drop ? ` · 드롭 ${esc(r.it.drop)}` : ""}</div>
          <div class="tags"><span class="tag">${esc(r.it.category)}</span></div>
          ${r.it.note ? `<div class="note">${esc(r.it.note)}</div>` : ""}
          <div class="reco-why">✓ ${r.why.slice(0, 3).map(esc).join(" · ")}</div>
        </div>
      </div>`).join("") +
    '<span class="reco-reset" id="reco-reset">다시 추천받기</span>';
  document.getElementById("reco-reset").addEventListener("click", () => {
    box.innerHTML = "";
    box.scrollIntoView({ behavior: "smooth", block: "center" });
  });
  box.scrollIntoView({ behavior: "smooth", block: "start" });
});

fetch("data/shoes.json")
  .then(r => r.json())
  .then(d => { items = d.items; render(); })
  .catch(() => { document.getElementById("subtitle").textContent = "데이터를 불러오지 못했어요"; });
</script>
</body>
</html>
