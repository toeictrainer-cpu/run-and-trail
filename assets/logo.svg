<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 런앤트레일 엠블럼: 산 두 개, 트레일, 러너, 해 -->
  <circle cx="50" cy="50" r="46.5" fill="none" stroke="#2e7d4f" stroke-width="2.6"/>
  <!-- 왼쪽 연한 산 -->
  <path d="M21 66 L44 34 L61 66" fill="none" stroke="#7cbf9a" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 오른쪽 진한 산 -->
  <path d="M37 66 L58 37 L79 66" fill="none" stroke="#2e7d4f" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 바닥선 -->
  <line x1="19" y1="66" x2="81" y2="66" stroke="#2e7d4f" stroke-width="2.6" stroke-linecap="round"/>
  <!-- 점선 트레일 (진한 산 왼쪽 능선을 따라) -->
  <line x1="50" y1="64" x2="57" y2="40" stroke="#7cbf9a" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="0.1 4.5"/>
  <!-- 해 -->
  <circle cx="31" cy="23" r="5.6" fill="none" stroke="#f4652a" stroke-width="2.6"/>
  <!-- 러너 (진한 산 정상 위) -->
  <g stroke="#f4652a" stroke-width="2.2" stroke-linecap="round" fill="none" transform="translate(-1.5,5)">
    <circle cx="67.5" cy="16.5" r="2.7" fill="#f4652a" stroke="none"/>
    <line x1="66" y1="20" x2="62.5" y2="26.5"/>          <!-- 몸통 -->
    <line x1="62.5" y1="26.5" x2="67.5" y2="30.5"/>      <!-- 앞다리 -->
    <line x1="62.5" y1="26.5" x2="57" y2="28.5"/>        <!-- 뒷다리 -->
    <line x1="65.5" y1="22" x2="70" y2="24"/>            <!-- 앞팔 -->
    <line x1="65.5" y1="22" x2="60.5" y2="20"/>          <!-- 뒷팔 -->
  </g>
  <!-- & -->
  <text x="42" y="77.5" font-family="Georgia, serif" font-size="9" fill="#f4652a" text-anchor="middle">&amp;</text>
</svg>
