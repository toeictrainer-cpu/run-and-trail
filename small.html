<meta property="og:description" content="동호회·지자체·러닝크루가 개최하는 지역 소규모 러닝 대회 소식. 우리 대회를 무료로 등록하고 홍보하세요.">

<body>
<nav class="topnav">
  <div class="inner">
    <span class="brand" id="brand"><img src="assets/logo.svg" alt="런앤트레일 로고">런앤트레일</span>
    <a href="index.html">대회 일정</a>
    <a href="small.html" class="active">소규모대회</a>
    <a href="photos.html">대회사진</a>
  </div>
</nav>
<div class="wrap">
  <header>
    <h1>🏘️ 소규모대회</h1>
    <p id="subtitle">불러오는 중...</p>
  </header>

  <div class="promo">
    <h2>지역 대회를 무료로 홍보하세요!</h2>
    <p>동호회·지자체·러닝크루가 자체 개최하는 소규모 대회를 등록해드립니다.
    아래 버튼을 눌러 대회 정보를 보내주시면 검토 후 게시됩니다. (무료)</p>
    <a id="submit-btn" href="#">📮 우리 대회 등록 신청</a>
  </div>

  <input class="search" id="search" type="search" placeholder="대회명·지역 검색">
  <div class="chips" id="region-chips"><span class="label">지역</span></div>

  <div id="list-view"></div>
  <footer>소규모대회 정보는 주최측이 제공한 내용입니다. 참가 전 주최측에 최종 확인하세요.</footer>
</div>

<script>
const DOW = ["일","월","화","수","목","금","토"];
const REGIONS = ["서울","인천","경기","강원","대전","세종","충남","충북","광주","전남","전북","대구","경북","경남","부산","울산","제주"];
let items = [], regionFilter = "all", query = "";
const today = new Date(); today.setHours(0,0,0,0);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// 등록 신청 버튼: 메일로 대회 정보 양식 보내기
const MAIL = "toeictrainer@nate.com";
const body = `아래 양식을 채워서 보내주세요. 검토 후 게시해드립니다.

대회명:
날짜:
지역(시/도):
장소:
종목(예: 5km, 10km):
참가비:
접수기간:
접수/안내 링크:
주최:
연락처:
대회 소개(2~3줄):
`;
document.getElementById("submit-btn").href =
  `mailto:${MAIL}?subject=${encodeURIComponent("[런앤트레일] 소규모대회 등록 신청")}&body=${encodeURIComponent(body)}`;

function dday(dateStr) {
  const d = Math.round((new Date(dateStr) - today) / 86400000);
  return d === 0 ? "D-DAY" : d > 0 ? `D-${d}` : null;
}

function render() {
  const q = query.toLowerCase();
  const shown = items.filter(r =>
    new Date(r.date) >= today &&
    (regionFilter === "all" || r.region === regionFilter) &&
    (!q || (r.name + r.location + (r.region || "") + (r.organizer || "")).toLowerCase().includes(q))
  ).sort((a, b) => a.date.localeCompare(b.date));
  document.getElementById("subtitle").textContent = `등록된 소규모대회 ${shown.length}개`;
  const list = document.getElementById("list-view");
  if (!shown.length) { list.innerHTML = '<div class="empty">아직 등록된 대회가 없어요.<br>첫 번째 대회를 등록해보세요!</div>'; return; }
  list.innerHTML = shown.map(r => {
    const d = new Date(r.date), dow = d.getDay(), dd = dday(r.date);
    return `<div class="card small-card">
      <div class="date-box">
        <div class="day">${d.getMonth()+1}/${d.getDate()}</div>
        <div class="dow ${dow===6?"sat":dow===0?"sun":""}">${DOW[dow]}요일</div>
        ${dd ? `<div class="dday ${dd==="D-DAY"||parseInt(dd.slice(2))<=7?"soon":""}">${dd}</div>` : ""}
      </div>
      <div class="info">
        <div class="name">${esc(r.name)}</div>
        <div class="meta">${r.region ? `<span class="region-tag">${esc(r.region)}</span> · ` : ""}📍 ${esc(r.location)}${r.organizer ? ` · ${esc(r.organizer)}` : ""}</div>
        <div class="tags">${(r.events || "").split(/[,/]/).map(e => e.trim()).filter(Boolean).map(e => `<span class="tag">${esc(e)}</span>`).join("")}
          ${r.fee ? `<span class="tag fee">${esc(r.fee)}</span>` : ""}</div>
        ${r.description ? `<div class="desc-line">${esc(r.description)}</div>` : ""}
        ${r.reg_period ? `<div class="desc-line">📝 접수: ${esc(r.reg_period)}</div>` : ""}
        <div class="actions-row">
          ${r.link ? `<a class="btn-primary" href="${esc(r.link)}" target="_blank" rel="noopener">접수/안내 페이지 ↗</a>` : ""}
          ${r.contact ? `<a class="btn-secondary" href="tel:${esc(r.contact)}">☎ ${esc(r.contact)}</a>` : ""}
        </div>
      </div>
    </div>`;
  }).join("");
}

const box = document.getElementById("region-chips");
box.insertAdjacentHTML("beforeend",
  [{k:"all",l:"전체"}, ...REGIONS.map(r => ({k:r,l:r}))].map((f, i) =>
    `<button class="chip ${i===0?"on":""}" data-key="${f.k}">${f.l}</button>`).join(""));
box.addEventListener("click", e => {
  const btn = e.target.closest(".chip"); if (!btn) return;
  box.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c === btn));
  regionFilter = btn.dataset.key; render();
});
document.getElementById("search").addEventListener("input", e => { query = e.target.value.trim(); render(); });

fetch("data/small_races.json")
  .then(r => r.json())
  .then(d => { items = d.items; render(); })
  .catch(() => { items = []; render(); });
</script>
</body>
</html>
